name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test database
        run: |
          PGPASSWORD=password psql -U user -h localhost -p 5433 -d db \
            -c "CREATE DATABASE url_shortener_test;"

      - name: Run linter
        run: ruff check src/

      - name: Run tests
        env:
          APP_SECRET_KEY: test-secret-key-for-ci-only
          APP_SAFE_BROWSING_API_KEY: test-api-key-for-ci-only
          DB_USER: user
          DB_PASSWORD: password
          DB_HOST: localhost
          DB_PORT: 5433
          DB_NAME: db
          REDIS_URL: redis://localhost:6379/0
        run: pytest -q