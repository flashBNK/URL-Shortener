name: url-shortener

services:

  db:
    image: postgres:16-alpine
    container_name: url_db
    restart: unless-stopped
    env_file:
      - ../config/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - url_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: url_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - url_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: build/Dockerfile
    container_name: url_app
    restart: unless-stopped
    env_file:
      - ../config/.env
    environment:
      # Внутри Docker сервисы общаются по имени контейнера, не localhost
      - DB_HOST=db            # перекрывает localhost из .env
      - DB_PORT=5432          # внутри Docker стандартный порт, не 5433
      - REDIS_URL=redis://redis:6379/0  # перекрывает localhost из .env
      - APP_FRONTEND_BASE_URL=${APP_FRONTEND_BASE_URL:-http://localhost:5173}
    ports:
      - "8000:8000"
    networks:
      - url_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  url_net:
    driver: bridge
